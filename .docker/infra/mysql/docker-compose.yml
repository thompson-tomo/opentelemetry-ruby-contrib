services:
  mysql:
    image: mysql:8.4.0@sha256:dab7049abafe3a0e12cbe5e49050cf149881c0cd9665c289e5808b9dad39c9e0
    environment:
      - MYSQL_DATABASE=mysql
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_PASSWORD=mysql
      - MYSQL_USER=mysql
    command: >
      bash -c "
        mkdir -p /etc/mysql/certs &&
        cp /host-certs/* /etc/mysql/certs/ &&
        chown mysql:mysql /etc/mysql/certs/* &&
        chmod 600 /etc/mysql/certs/*key.pem &&
        exec docker-entrypoint.sh mysqld
      "
    volumes:
      - ./certs:/host-certs:ro
      - ./config/my.cnf:/etc/mysql/my.cnf:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot"]
      interval: 5s
      timeout: 2s
      retries: 3
